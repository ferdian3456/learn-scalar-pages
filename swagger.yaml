  /posts/{postId}/likes:
    delete:
      description: |
        ## Unlike Post Flow

        ### Overview
        Removes a like from a post. Requires membership in the server where the post belongs.

        **Idempotent**: If the user hasn't liked the post, the request succeeds and returns the current like count (no error).

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse `postId` from URL path — must be a valid UUID
        3. Check if user is a member of the server where the post belongs
        4. Check if user has liked this post
           - If liked → delete like record
           - If not liked → **skip delete**, proceed to get like count (idempotent)
        5. Get updated like count
        6. Return updated like count

        ### Database Operations

        #### PostgreSQL — Check Post Server Membership
        ```sql
        SELECT 1
        FROM server_posts sp
        INNER JOIN server_members sm ON sp.server_id = sm.server_id
        WHERE sp.id = $1 AND sm.user_id = $2 AND sm.status = $3
        ```

        #### PostgreSQL — Check Already Liked
        ```sql
        SELECT 1 FROM server_post_likes WHERE post_id = $1 AND user_id = $2
        ```
        - If no row → hasn't liked yet (skip delete, return like count)

        #### PostgreSQL — Delete Like (if already liked)
        ```sql
        DELETE FROM server_post_likes WHERE post_id = $1 AND user_id = $2
        ```
        - **Table**: `server_post_likes`
        - Only executed if user has already liked

        #### PostgreSQL — Get Updated Like Count
        ```sql
        SELECT COUNT(*) FROM server_post_likes WHERE post_id = $1
        ```
        - **Table**: `server_post_likes`
        - Returns current like count after unlike operation

        ### Error Cases
        - Invalid postId → `400` with "Invalid post id"
        - Not a member → `400` with "You are not a member of this server"

        ### Flow
        ```
        Request → Auth Middleware → Parse PostId → Check Membership (DB) → Check Already Liked (DB) → [if liked: Delete Like (DB)] → Get Updated Count (DB) → Response
        ```

        ### Idempotency
        - Calling this endpoint multiple times with the same user and post will:
          - **First call** (when liked): Delete like record, return decremented like count
          - **Subsequent calls**: Skip delete, return current like count (no error)
        - This allows for optimistic UI updates on the frontend without worrying about duplicate unlike requests
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Post UUID
          in: path
          name: postId
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/model.PostLikeResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Unlike a post
      tags:
        - post-interactions
    post:
      description: |
        ## Like Post Flow

        ### Overview
        Likes a post. Requires membership in the server where the post belongs. Each user can only like a post once.

        **Idempotent**: If the user has already liked the post, the request succeeds and returns the current like count (no error).

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse `postId` from URL path — must be a valid UUID
        3. Check if user is a member of the server where the post belongs
        4. Check if user already liked this post
           - If already liked → **skip insert**, proceed to get like count (idempotent)
           - If not liked → create like record
        5. Get updated like count
        6. Return updated like count

        ### Database Operations

        #### PostgreSQL — Check Post Server Membership
        ```sql
        SELECT 1
        FROM server_posts sp
        INNER JOIN server_members sm ON sp.server_id = sm.server_id
        WHERE sp.id = $1 AND sm.user_id = $2 AND sm.status = $3
        ```

        #### PostgreSQL — Check Already Liked
        ```sql
        SELECT 1 FROM server_post_likes WHERE post_id = $1 AND user_id = $2
        ```
        - **Table**: `server_post_likes`
        - If row exists → already liked (skip insert, return like count)

        #### PostgreSQL — Create Like (if not already liked)
        ```sql
        INSERT INTO server_post_likes (id, post_id, user_id, create_datetime, update_datetime, create_user_id, update_user_id)
        VALUES ($1, $2, $3, $4, $5, $6, $7)
        ```
        - **Table**: `server_post_likes`
        - **Columns**: `id` (UUID), `post_id`, `user_id`, timestamps, audit IDs
        - Only executed if user hasn't liked yet

        #### PostgreSQL — Get Updated Like Count
        ```sql
        SELECT COUNT(*) FROM server_post_likes WHERE post_id = $1
        ```
        - **Table**: `server_post_likes`
        - Returns current like count after like operation

        ### Error Cases
        - Invalid postId → `400` with "Invalid post id"
        - Not a member → `400` with "You are not a member of this server"

        ### Flow
        ```
        Request → Auth Middleware → Parse PostId → Check Membership (DB) → Check Already Liked (DB) → [if not liked: Create Like (DB)] → Get Updated Count (DB) → Response
        ```

        ### Idempotency
        - Calling this endpoint multiple times with the same user and post will:
          - **First call**: Create like record, return incremented like count
          - **Subsequent calls**: Skip insert, return current like count (no error)
        - This allows for optimistic UI updates on the frontend without worrying about duplicate like requests
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Post UUID
          in: path
          name: postId
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/model.PostLikeResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Like a post
      tags:
        - post-interactions
  /servers/:
    get:
      description: |
        ## Get Discovery Server Flow

        ### Overview
        Retrieves a paginated list of discoverable (public) servers. Supports cursor-based pagination and optional filtering by category.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse query parameters: `limit` (default: system default), `categoryId` (default: 0 = all), `cursor` (optional)
        3. Validate `limit` (>= 0 and <= max limit)
        4. If cursor provided, decode from base64 URL-safe encoding and unmarshal to `ServerDiscoveryCursor`
        5. Query discoverable servers from database (limit + 1 for cursor detection)
        6. Build MinIO image URLs for avatar and banner
        7. If results > limit, create next cursor from last item's ID and createDatetime
        8. Return paginated server list

        ### Database Operations

        #### PostgreSQL — Get Discovery Servers (first page)
        ```sql
        SELECT A.id, A.name, A.short_name, B.name, C.object_key, D.object_key, A.description, A.create_datetime
        FROM servers A
        LEFT JOIN server_categories B ON A.category_id = B.id
        LEFT JOIN server_avatar_images C ON A.avatar_image_id = C.id
        LEFT JOIN server_banner_images D ON A.banner_image_id = D.id
        WHERE ($1::int IS NULL OR B.id = $1)
        AND (A.settings->>'isPrivate')::boolean = false
        ORDER BY A.create_datetime DESC, A.id DESC
        LIMIT $2
        ```

        #### PostgreSQL — Get Discovery Servers (with cursor)
        ```sql
        SELECT A.id, A.name, A.short_name, B.name, C.object_key, D.object_key, A.description, A.create_datetime
        FROM servers A
        LEFT JOIN server_categories B ON A.category_id = B.id
        LEFT JOIN server_avatar_images C ON A.avatar_image_id = C.id
        LEFT JOIN server_banner_images D ON A.banner_image_id = D.id
        WHERE (A.create_datetime < $1 OR (A.create_datetime = $1 AND A.id < $2))
        AND ($3::int IS NULL OR B.id = $3)
        AND (A.settings->>'isPrivate')::boolean = false
        ORDER BY A.create_datetime DESC, A.id DESC
        LIMIT $4
        ```
        - **Tables**: `servers` (A) LEFT JOIN `server_categories` (B), `server_avatar_images` (C), `server_banner_images` (D)
        - **Filter**: Only public servers (`settings->>'isPrivate' = false`)
        - **Cursor**: keyset pagination on `(create_datetime, id)` DESC
        - **Category filter**: Optional, filters by `server_categories.id`

        #### MinIO — Image URL Construction
        ```
        {MINIO_FULL_URL}/{object_key}
        ```
        - Avatar: `{MINIO_FULL_URL}/server/avatar/{imageId}.webp`
        - Banner: `{MINIO_FULL_URL}/server/banner/{imageId}.webp`

        ### Query Parameters
        - `limit` — number of items per page (optional, has default)
        - `categoryId` — filter by category (optional, 0 = all categories)
        - `cursor` — base64-encoded cursor for next page (optional)

        ### Error Cases
        - Limit < 0 → `400` with "Limit must be greater or equal than 0"
        - Limit > max → `400` with "Limit is exceeded max limit: {max}"

        ### Flow
        ```
        Request → Auth Middleware → Parse Query Params → Validate Limit → Decode Cursor → Query Servers (DB) → Build Image URLs → Build Next Cursor → Response
        ```
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Items per page
          in: query
          name: limit
          type: integer
        - description: Filter by category ID
          in: query
          name: categoryId
          type: integer
        - description: Pagination cursor
          in: query
          name: cursor
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/model.DiscoveryServerResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Get discoverable servers
      tags:
        - servers
  /servers/{id}:
    delete:
      description: |
        ## Delete Server Flow

        ### Overview
        Deletes a server permanently. Only the server owner can perform this action.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse `id` from URL path — must be a valid UUID
        3. Check server ownership
        4. Delete server from database (CASCADE deletes related records)

        ### Database Operations

        #### PostgreSQL — Check Server Ownership
        ```sql
        SELECT 1 FROM servers WHERE id = $1 AND owner_id = $2
        ```

        #### PostgreSQL — Delete Server
        ```sql
        DELETE FROM servers WHERE id = $1
        ```
        - **Table**: `servers`
        - **CASCADE**: Database constraints cascade-delete related records: `server_members`, `server_roles`, `server_invites`, `server_posts` (which cascade-delete `server_post_likes`, `server_post_comments`), `server_avatar_images`, `server_banner_images`

        ### Error Cases
        - Invalid server id → `400` with "Invalid server id"
        - Not owner → `400` with "You are not the owner of this server"

        ### Flow
        ```
        Request → Auth Middleware → Parse ServerId → Check Ownership (DB) → Delete Server (DB, CASCADE) → Response (no data)
        ```
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Server UUID
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Delete a server
      tags:
        - servers
    get:
      description: |
        ## Get Server By ID Flow

        ### Overview
        Retrieves detailed information about a specific server. Access is controlled: public servers are visible to all authenticated users, private servers are only visible to members.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse `id` from URL path parameter — must be a valid UUID
        3. Query server details with a single query that checks both existence AND membership for private servers
        4. If server not found (or private and user is not a member), return error
        5. Build full MinIO URLs for avatar and banner images
        6. Return server detail

        ### Database Operations

        #### PostgreSQL — Get Server By ID (with access control)
        ```sql
        SELECT A.id, A.name, A.short_name, B.name, C.object_key, D.object_key,
               A.description, A.create_datetime, E.username, (A.settings->>'isPrivate')::boolean as is_private
        FROM servers A
        LEFT JOIN server_categories B ON A.category_id = B.id
        LEFT JOIN server_avatar_images C ON A.avatar_image_id = C.id
        LEFT JOIN server_banner_images D ON A.banner_image_id = D.id
        LEFT JOIN users E ON A.create_user_id = E.id
        WHERE A.id = $1
        AND (
            (A.settings->>'isPrivate')::boolean = false
            OR
            EXISTS (
                SELECT 1 FROM server_members F
                WHERE F.server_id = A.id AND F.user_id = $2 AND F.status = 1
            )
        )
        ```
        - **Tables**: `servers` (A) LEFT JOIN `server_categories` (B), `server_avatar_images` (C), `server_banner_images` (D), `users` (E)
        - **Subquery**: checks `server_members` for active membership if server is private
        - **Columns returned**: `id`, `name`, `short_name`, `category_name`, avatar `object_key`, banner `object_key`, `description`, `create_datetime`, `username` (creator), `is_private`

        #### MinIO — Image URL Construction
        ```
        Avatar: {MINIO_FULL_URL}/{object_key}  (e.g., server/avatar/{imageId}.webp)
        Banner: {MINIO_FULL_URL}/{object_key}  (e.g., server/banner/{imageId}.webp)
        ```

        ### Error Cases
        - Invalid server id → `400` with "Invalid server id"
        - Server not found or no permission → `400` with "Server not found or you don't have permission to access it"

        ### Flow
        ```
        Request → Auth Middleware → Parse ServerId → Query Server (DB, checks visibility + membership) → Build Image URLs → Response
        ```
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Server UUID
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/model.ServerDetailResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Get server by ID
      tags:
        - servers
  /servers/{id}/avatar:
    put:
      consumes:
        - multipart/form-data
      description: |
        ## Update Server Avatar Flow

        ### Overview
        Updates the avatar image of a server. Only the server owner can perform this action. Accepts multipart form file upload.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context
        2. Parse `id` from URL path — must be a valid UUID
        3. Check server ownership
        4. Read `avatar` file from multipart form
        5. Validate image file (format, size)
        6. Begin database transaction
        7. Get current server detail to find old avatar
        8. If new avatar provided: create new image record → update server reference → upload to MinIO → delete old image if exists
        9. If no new avatar (empty file): update server to remove reference → delete old image if exists
        10. Commit transaction

        ### Database Operations

        #### PostgreSQL — Check Server Ownership
        ```sql
        SELECT 1 FROM servers WHERE id = $1 AND owner_id = $2
        ```

        #### PostgreSQL — Get Server Detail (inside TX, for old avatar)
        ```sql
        SELECT id, owner_id, name, short_name, category_id, avatar_image_id, banner_image_id, description, settings, create_datetime, update_datetime, create_user_id, update_user_id
        FROM servers WHERE id = $1
        ```
        - Used to get `avatar_image_id` for old avatar cleanup

        #### PostgreSQL — Create New Avatar Image (inside TX)
        ```sql
        INSERT INTO server_avatar_images (id, bucket, object_key, mime_type, size, create_datetime, update_datetime, create_user_id, update_user_id)
        VALUES ($1, $2, $3, $4, $5, $6, $7, $8, $9)
        ```
        - **Table**: `server_avatar_images`
        - **Columns**: `id` (UUID), `bucket`, `object_key` (e.g., `server/avatar/{imageId}.webp`), `mime_type` (`image/webp`), `size`

        #### PostgreSQL — Update Server Avatar Reference (inside TX)
        ```sql
        UPDATE servers SET avatar_image_id = $1, update_datetime = $2, update_user_id = $3 WHERE id = $4
        ```
        - Sets `avatar_image_id` to new image UUID or NULL (when removing)

        #### PostgreSQL — Get Old Avatar Object Key (inside TX)
        ```sql
        SELECT object_key FROM server_avatar_images WHERE id = $1 LIMIT 1
        ```

        #### PostgreSQL — Delete Old Avatar Image Record (inside TX)
        ```sql
        DELETE FROM server_avatar_images WHERE id = $1
        ```

        #### MinIO — Upload New Avatar
        ```
        PUT {bucket}/server/avatar/{imageId}.webp
        Content-Type: image/webp
        Cache-Control: public, max-age=31536000, immutable
        ```

        #### MinIO — Delete Old Avatar (if exists)
        ```
        DELETE {bucket}/{old_object_key}
        ```

        ### Error Cases
        - Invalid server id → `400` with "Invalid server id"
        - Not owner → `400` with "You are not the owner of this server"
        - Invalid image → `400` validation error

        ### Flow
        ```
        Request → Auth Middleware → Parse ServerId → Check Ownership (DB) → Read File → Validate Image → Begin TX → Handle Old/New Avatar → Commit TX → Response (no data)
        ```
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
        - description: Server UUID
          in: path
          name: id
          required: true
          type: string
        - description: Avatar image file
          in: formData
          name: avatar
          required: true
          type: file
      produces:
        - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Update server avatar
      tags:
        - servers
