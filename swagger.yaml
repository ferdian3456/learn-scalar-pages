  /users/logout:
    post:
      description: |
        ## Logout Flow

        ### Overview
        Logs out the authenticated user by revoking all refresh tokens in PostgreSQL and removing the access token from Redis cache.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token.

        ### Business Logic
        1. Get `userId` from context (set by auth middleware)
        2. Revoke all active refresh tokens for this user in PostgreSQL
        3. Remove access token from Redis cache
        4. Return success with no data

        ### Database Operations

        #### PostgreSQL — Revoke All Refresh Tokens
        ```sql
        UPDATE refresh_tokens
        SET revoked_at = $1, updated_at = $2, updated_by = $3
        WHERE user_id = $4 AND revoked_at IS NULL
        ```
        - **Table**: `refresh_tokens`
        - **Columns updated**: `revoked_at`, `updated_at`, `updated_by`
        - **Filter**: `user_id`, `revoked_at IS NULL` (only active tokens)
        - **Effect**: All refresh tokens for this user become invalid

        #### Redis — Remove Access Token
        ```
        DEL auth:accessToken:{userId}
        ```
        - Deletes the access token hash from Redis
        - After deletion, the user's current access token becomes invalid for future requests

        ### Error Cases
        - No/invalid auth token → `404` (handled by auth middleware)
        - Failed to revoke refresh tokens → `500` internal server error
        - Failed to remove access token → `500` internal server error

        ### Flow
        ```
        Request → Auth Middleware (JWT) → Get UserId → Revoke Refresh Tokens (PostgreSQL) → Remove Access Token (Redis) → Response (no data)
        ```

        ### Security Notes
        - All refresh tokens for the user are revoked on logout
        - User must login again to get new tokens
        - Access token is immediately invalidated
        - Refresh token rotation prevents token reuse
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Logout user
      tags:
        - users
  /users/me:
    get:
      description: |
        ## Get User Info Flow

        ### Overview
        Retrieves the authenticated user's profile information including avatar URL.

        ### Auth
        Requires `Authorization` header with Bearer JWT access token. The `userId` is extracted from the token by the auth middleware.

        ### Business Logic
        1. Get `userId` from context (set by auth middleware)
        2. Query user info from database by userId
        3. If user has an avatar image, construct the full MinIO URL for the avatar
        4. Return user profile data

        ### Database Operations

        #### PostgreSQL — Get User Info
        ```sql
        SELECT A.id, A.username, A.fullname, A.email, B.object_key, A.bio, A.create_datetime, A.update_datetime
        FROM users A
        LEFT JOIN user_avatar_images B ON A.id = B.user_id
        WHERE A.id = $1
        LIMIT 1
        ```
        - **Tables**: `users` (A) LEFT JOIN `user_avatar_images` (B)
        - **Join condition**: `users.id = user_avatar_images.user_id`
        - **Columns returned**: `id`, `username`, `fullname`, `email`, `object_key` (avatar), `bio`, `create_datetime`, `update_datetime`

        #### MinIO — Avatar URL Construction
        ```
        {MINIO_FULL_URL}/{object_key}
        ```
        - If `object_key` is not NULL, full URL is built as: `http(s)://{host}:{port}/{bucket}/{object_key}`
        - Object key format: `user/avatar/{imageId}.webp`

        ### Error Cases
        - No/invalid auth token → `404` (handled by auth middleware)
        - Token expired → `404` with "Authorization token is expired"
        - User not found → `404` validation error

        ### Flow
        ```
        Request → Auth Middleware (JWT) → Get UserId → Query User (DB) → Build Avatar URL (MinIO) → Response
        ```

        ### Response Fields
        - `id` — user UUID
        - `username` — unique username
        - `fullname` — display name
        - `email` — user email
        - `avatarImage` — full URL to avatar image (nullable)
        - `bio` — user bio (nullable)
        - `createDatetime` — account creation timestamp
        - `updateDatetime` — last update timestamp
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/model.UserResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/model.ValidationError"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/model.ValidationError"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/model.ValidationError"
      summary: Get current user info
      tags:
        - users
