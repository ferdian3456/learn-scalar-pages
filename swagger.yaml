swagger: "2.0"
host: localhost:3000
basePath: /api/v1
info:
  contact: {}
  description: Virdan Project API Documentation
  title: Virdan API
  version: "1.0"

definitions:
  model.UserLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  model.ValidationError:
    properties:
      code:
        type: string
      message:
        type: string
      param:
        type: string
    type: object

paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Login user
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - description: Payload
          in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/model.UserLoginRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UserLoginRequest'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ValidationError'
      description: |-
        ## Login Flow

        ### Sequence Diagram

        ```mermaid
        sequenceDiagram
            participant C as Client
            participant S as Server
            participant DB as Database
            participant R as Redis

            C->>S: POST /auth/login (email, password)
            S->>S: Validate Payload
            S->>DB: Check email exists?
            alt Email tidak ditemukan
                DB-->>S: null
                S-->>C: 404 Not Found
            else Email ditemukan
                DB-->>S: User data
                S->>S: bcrypt.compare(password)
                alt Password salah
                    S-->>C: 401 Unauthorized
                else Password cocok
                    S->>S: Check account status
                    alt Akun suspended
                        S-->>C: 403 Forbidden
                    else Akun aktif
                        S->>S: Generate JWT (access + refresh token)
                        S->>R: Store refresh token (TTL 7 hari)
                        R-->>S: OK
                        S-->>C: 200 OK (access_token, refresh_token)
                    end
                end
            end
        ```

        ### Business Logic
        1. Validasi request payload (email & password wajib diisi)
        2. Cek apakah email terdaftar di database — return `404` kalau tidak ditemukan
        3. Verifikasi password dengan bcrypt compare — return `401` kalau tidak cocok
        4. Cek status akun user — return `403` kalau akun suspended/banned
        5. Generate JWT access token & refresh token
        6. Simpan refresh token ke Redis dengan TTL
        7. Return access token & refresh token ke client

        ### Edge Cases
        - Email tidak terdaftar → `404 Not Found`
        - Password salah → `401 Unauthorized`
        - Akun suspended → `403 Forbidden`
        - Rate limit exceeded (terlalu banyak percobaan login) → `429 Too Many Requests`
        - Redis down → login tetap bisa, tapi refresh token tidak disimpan

        ### Token Info
        - **Access Token** — short-lived (15 menit), dipakai untuk autentikasi request
        - **Refresh Token** — long-lived (7 hari), dipakai untuk generate access token baru
